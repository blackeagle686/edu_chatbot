<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRYM Educational Chatbot</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <a class="navbar-brand fw-bold" href="#">
            <i class="fas fa-brain me-2"></i>IRYM Master
        </a>
        <div class="ms-auto text-light opacity-75 small">
            Empowering Learning with AI
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                Hello! I am your IRYM Educational Assistant. Ask me anything about your courses! Now I can also analyze
                images you upload!
            </div>
        </div>

        <div id="image-preview-container">
            <img id="image-preview" class="preview-image" src="">
            <button type="button" class="remove-image" id="remove-image-btn"><i class="fas fa-times"></i></button>
        </div>

        <div class="chat-input-area">
            <form id="chat-form">
                <div class="input-group">
                    <input type="file" id="image-input" accept="image/*" style="display: none;">
                    <button type="button" class="upload-btn" onclick="document.getElementById('image-input').click()">
                        <i class="fas fa-image"></i>
                    </button>
                    <input type="text" id="user-input" class="form-control" placeholder="Type your question here..."
                        autocomplete="off">
                    <button class="btn btn-send" type="submit">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS & Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const imageInput = document.getElementById('image-input');
        const chatMessages = document.getElementById('chat-messages');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');

        let selectedImage = null;

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedImage = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    imagePreviewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        removeImageBtn.addEventListener('click', () => {
            selectedImage = null;
            imageInput.value = '';
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';
        });

        function appendMessage(text, sender, imageUrl = null) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);

            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.classList.add('chat-img');
                messageDiv.appendChild(img);
            }

            const textSpan = document.createElement('span');
            textSpan.innerText = text;
            messageDiv.appendChild(textSpan);

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.classList.add('message', 'bot', 'loading-msg');
            loadingDiv.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return loadingDiv;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message && !selectedImage) return;

            // In case of image only, use a default prompt if message is empty
            const prompt = message || "Analyze this image.";

            const currentSelectedImage = selectedImage;
            const imageUrl = currentSelectedImage ? URL.createObjectURL(currentSelectedImage) : null;

            appendMessage(prompt, 'user', imageUrl);

            // Reset input and preview
            userInput.value = '';
            selectedImage = null;
            imageInput.value = '';
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';

            const loading = appendLoading();

            try {
                const formData = new FormData();
                formData.append('message', prompt);
                if (currentSelectedImage) {
                    formData.append('image', currentSelectedImage);
                }

                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                chatMessages.removeChild(loading);

                if (data.response) {
                    appendMessage(data.response, 'bot');
                } else {
                    appendMessage("Sorry, I encountered an error: " + (data.error || "Unknown error"), 'bot');
                }
            } catch (error) {
                if (loading && loading.parentNode) {
                    chatMessages.removeChild(loading);
                }
                appendMessage("Failed to connect to the server.", "bot");
                console.error(error);
            }
        });
    </script>
</body>

</html>
