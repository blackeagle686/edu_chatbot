<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRYM Educational Chatbot</title>
    <meta name="description"
        content="IRYM Educational Assistant – AI-powered learning with vision and RAG capabilities.">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js (Markdown → HTML) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- ───────────── Navbar ───────────── -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <i class="fas fa-brain"></i>
            IRYM Master
        </a>
        <div class="d-flex align-items-center gap-3">
            <div class="form-check form-switch text-light mb-0" style="margin-right: 15px;">
                <input class="form-check-input" type="checkbox" id="role-switch" style="cursor: pointer;">
                <label class="form-check-label font-weight-bold" for="role-switch" id="role-label"
                    style="opacity: 0.9; cursor: pointer; font-size: 0.9em; padding-top: 2px;">Learner Mode</label>
            </div>

            <span class="navbar-tagline d-none d-sm-block">Empowering Learning with AI</span>
            <div class="status-pill">
                <span class="status-dot"></span>
                Online
            </div>
        </div>
    </nav>



    <!-- ───────────── Chat Container ───────────── -->
    <div class="chat-container">

        <!-- Chat Header -->
        <div class="chat-header">
            <div class="bot-avatar-lg">
                <i class="fas fa-robot"></i>
            </div>
            <div class="chat-header-info">
                <h6>IRYM Educational Assistant</h6>
                <small>Ask me anything · Vision-enabled · RAG-powered</small>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages">

            <div class="chat-divider"><span>Today</span></div>

            <!-- Welcome message -->
            <div class="message-row">
                <div class="msg-avatar bot-av"><i class="fas fa-robot"></i></div>
                <div>
                    <div class="message bot welcome">
                        👋 Hello! I'm your <strong>IRYM Educational Assistant</strong>.<br>
                        Ask me anything about your courses, or upload an image for AI-powered visual analysis!
                        <span class="msg-time" id="welcome-time"></span>
                    </div>
                </div>
            </div>

        </div>

        <!-- ── Image Preview Strip ── -->
        <div id="image-preview-container">
            <img id="image-preview" class="preview-image" src="" alt="Preview">
            <span class="preview-label"><i class="fas fa-image me-1"></i>Image ready to send</span>
            <button type="button" class="remove-image" id="remove-image-btn" title="Remove image">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- ── Input ── -->
        <div class="chat-input-area">
            <form id="chat-form">
                <div class="input-group">
                    <input type="file" id="image-input" accept="image/*" style="display:none;">
                    <button type="button" class="upload-btn" id="upload-btn"
                        onclick="document.getElementById('image-input').click()" title="Attach image">
                        <i class="fas fa-image"></i>
                    </button>
                    <!-- Document upload button -->
                    <input type="file" id="doc-input" accept=".pdf,.txt,.md,.docx,.csv" style="display:none;">
                    <button type="button" class="upload-btn" id="doc-upload-trigger"
                        onclick="document.getElementById('doc-input').click()" title="Upload document for RAG">
                        <i class="fas fa-file-alt"></i>
                    </button>
                    <input type="text" id="user-input" class="form-control"
                        placeholder="Ask a question or describe an image…" autocomplete="off">
                    <button class="btn-send" type="submit" id="send-btn" title="Send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </div>

    </div><!-- /.chat-container -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /* ── Helpers (must be first) ── */
        function now() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderMarkdown(text) {
            if (typeof marked !== 'undefined') {
                return marked.parse(text);
            }
            return text.replace(/\n/g, '<br>');
        }

        /* ── DOM refs ── */
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const imageInput = document.getElementById('image-input');
        const chatMessages = document.getElementById('chat-messages');
        const imgPreviewC = document.getElementById('image-preview-container');
        const imgPreview = document.getElementById('image-preview');
        const removeBtn = document.getElementById('remove-image-btn');
        const sendBtn = document.getElementById('send-btn');

        let selectedImage = null;

        /* ── Stamp welcome time ── */
        document.getElementById('welcome-time').textContent = now();

        /* ── Image pick ── */
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedImage = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgPreview.src = ev.target.result;
                imgPreviewC.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        });

        /* ── Role toggle ── */
        const roleSwitch = document.getElementById('role-switch');
        const roleLabel = document.getElementById('role-label');

        roleSwitch.addEventListener('change', (e) => {
            if (e.target.checked) {
                roleLabel.textContent = 'Helper Mode';
            } else {
                roleLabel.textContent = 'Learner Mode';
            }
        });

        /* ── Document upload ── */
        const docInput = document.getElementById('doc-input');
        const docUploadTrigger = document.getElementById('doc-upload-trigger');

        docInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            docUploadTrigger.disabled = true;
            docUploadTrigger.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/upload_doc', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.status === 'success') {
                    if (typeof appendMessage === 'function') {
                        appendMessage(`✅ Document **${file.name}** uploaded and ingested successfully!`, 'bot');
                    } else {
                        alert('Document uploaded and ingested successfully!');
                    }
                } else {
                    if (typeof appendMessage === 'function') {
                        appendMessage(`❌ Error uploading document: ${data.error || 'Upload failed'}`, 'bot');
                    } else {
                        alert('Error: ' + (data.error || 'Upload failed'));
                    }
                }
            } catch (err) {
                if (typeof appendMessage === 'function') {
                    appendMessage(`❌ Connection error during document upload.`, 'bot');
                } else {
                    alert('Connection error during upload.');
                }
                console.error(err);
            } finally {
                docUploadTrigger.disabled = false;
                docUploadTrigger.innerHTML = '<i class="fas fa-file-alt"></i>';
                docInput.value = '';
            }
        });

        removeBtn.addEventListener('click', clearImage);
        function clearImage() {
            selectedImage = null;
            imageInput.value = '';
            imgPreviewC.style.display = 'none';
            imgPreview.src = '';
        }

        /* ── Append message row ── */
        function appendMessage(text, sender, imageUrl = null) {
            const row = document.createElement('div');
            row.classList.add('message-row');
            if (sender === 'user') row.classList.add('user-row');

            const avatar = document.createElement('div');
            avatar.classList.add('msg-avatar');
            avatar.classList.add(sender === 'user' ? 'user-av' : 'bot-av');
            avatar.innerHTML = sender === 'user'
                ? '<i class="fas fa-user"></i>'
                : '<i class="fas fa-robot"></i>';

            const bubble = document.createElement('div');
            bubble.classList.add('message', sender);

            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.classList.add('chat-img');
                bubble.appendChild(img);
            }

            const content = document.createElement('div');
            content.classList.add('msg-content');
            if (sender === 'bot') {
                content.innerHTML = renderMarkdown(text);
            } else {
                content.textContent = text;
            }
            bubble.appendChild(content);

            const time = document.createElement('span');
            time.classList.add('msg-time');
            time.textContent = now();
            bubble.appendChild(time);

            row.appendChild(avatar);
            row.appendChild(bubble);

            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        /* ── Loading indicator ── */
        function appendLoading() {
            const row = document.createElement('div');
            row.classList.add('message-row');

            const avatar = document.createElement('div');
            avatar.classList.add('msg-avatar', 'bot-av');
            avatar.innerHTML = '<i class="fas fa-robot"></i>';

            const bubble = document.createElement('div');
            bubble.classList.add('message', 'bot', 'loading-msg');
            bubble.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

            row.appendChild(avatar);
            row.appendChild(bubble);
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return row;
        }

        /* ── Submit ── */
        let isProcessing = false;

        async function handleSubmit(e) {
            if (e) e.preventDefault();
            if (isProcessing) return;

            const message = userInput.value.trim();
            if (!message && !selectedImage) return;

            isProcessing = true;
            const prompt = message || 'Analyze this image.';
            const currentImage = selectedImage;
            const imageUrl = currentImage ? URL.createObjectURL(currentImage) : null;

            appendMessage(prompt, 'user', imageUrl);

            userInput.value = '';
            clearImage();

            // Disable send while waiting
            sendBtn.disabled = true;
            sendBtn.style.opacity = '0.6';

            const loadingRow = appendLoading();

            try {
                const formData = new FormData();
                formData.append('message', prompt);
                formData.append('role', roleSwitch.checked ? 'helper' : 'user');
                if (currentImage) {
                    formData.append('image', currentImage);
                }

                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (loadingRow && loadingRow.parentNode) {
                    chatMessages.removeChild(loadingRow);
                }

                const reply = data.response
                    || ('Sorry, I encountered an error: ' + (data.error || 'Unknown error'));
                appendMessage(reply, 'bot');

            } catch (err) {
                if (loadingRow && loadingRow.parentNode) {
                    chatMessages.removeChild(loadingRow);
                }
                appendMessage('Failed to connect to the server. Please try again.', 'bot');
                console.error('Chat error:', err);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                sendBtn.style.opacity = '1';
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        chatForm.addEventListener('submit', handleSubmit);
    </script>
</body>

</html>
