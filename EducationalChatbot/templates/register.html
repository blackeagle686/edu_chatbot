<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Wasla Edu</title>
    <meta name="description" content="Create your free Wasla Edu account — AI-powered educational assistant.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8B0000;
            --secondary: #FF6A00;
            --tertiary: #FFB871;
            --prim-soft: #FFB4A8;
            --bg: #131313;
            --bg-low: #1C1B1B;
            --bg-card: #1C1B1B;
            --bg-input: #252525;
            --txt-1: #E5E2E1;
            --txt-var: #E3BEB8;
            --txt-m: rgba(229, 226, 225, .5);
            --brd: rgba(90, 64, 60, .55);
            --brd-h: rgba(255, 106, 0, .45);
            --err: #93000A;
            --err-l: #FFB4AB;
            --grad: linear-gradient(135deg, #8B0000, #FF6A00);
            --ease: 0.22s cubic-bezier(.4, 0, .2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--txt-1);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 70% 55% at 12% 8%, rgba(139, 0, 0, .22) 0%, transparent 65%),
                radial-gradient(ellipse 55% 45% at 88% 88%, rgba(255, 106, 0, .14) 0%, transparent 60%);
        }

        nav {
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.95rem 2rem;
            background: rgba(14, 14, 14, .82);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--brd);
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--secondary), var(--tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: .55rem;
            text-decoration: none;
        }

        .brand i {
            -webkit-text-fill-color: initial;
            color: var(--secondary);
            filter: drop-shadow(0 0 7px rgba(139, 0, 0, .6));
        }

        .nav-pill {
            font-size: .83rem;
            font-weight: 600;
            color: var(--txt-var);
            text-decoration: none;
            padding: .42rem 1rem;
            border: 1px solid var(--brd);
            border-radius: 10px;
            transition: all var(--ease);
        }

        .nav-pill:hover {
            color: var(--tertiary);
            border-color: var(--brd-h);
            background: rgba(139, 0, 0, .1);
        }

        main {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--brd);
            border-radius: 22px;
            padding: 2.5rem 2.25rem;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, .025) inset,
                0 8px 48px rgba(0, 0, 0, .6),
                0 0 60px rgba(139, 0, 0, .14),
                0 0 100px rgba(255, 106, 0, .06);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: .7rem;
            margin-bottom: 1.75rem;
        }

        .auth-logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: #fff;
            box-shadow: 0 4px 18px rgba(139, 0, 0, .4);
        }

        .auth-logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--secondary), var(--tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.55rem;
            font-weight: 800;
            margin-bottom: .3rem;
        }

        .auth-sub {
            font-size: .84rem;
            color: var(--txt-m);
            margin-bottom: 1.75rem;
            line-height: 1.6;
        }

        .auth-error {
            background: rgba(147, 0, 10, .15);
            border: 1px solid rgba(147, 0, 10, .35);
            color: var(--err-l);
            border-radius: 10px;
            font-size: .84rem;
            padding: .65rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .form-group {
            margin-bottom: 1.15rem;
        }

        label.lbl {
            display: block;
            font-size: .75rem;
            font-weight: 600;
            color: var(--txt-m);
            letter-spacing: .05em;
            text-transform: uppercase;
            margin-bottom: .45rem;
        }

        .iw {
            position: relative;
        }

        .iw i.ico {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--txt-m);
            font-size: .88rem;
            pointer-events: none;
            transition: color var(--ease);
        }

        .iw:focus-within i.ico {
            color: var(--secondary);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .76rem 1rem .76rem 2.6rem;
            background: var(--bg-input);
            border: 1px solid var(--brd);
            border-radius: 11px;
            color: var(--txt-1);
            font-size: .92rem;
            font-family: inherit;
            outline: none;
            transition: border-color var(--ease), box-shadow var(--ease);
        }

        input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(255, 106, 0, .12);
        }

        input::placeholder {
            color: rgba(229, 226, 225, .22);
        }

        /* Role picker */
        .role-head {
            font-size: .75rem;
            font-weight: 600;
            color: var(--txt-m);
            letter-spacing: .05em;
            text-transform: uppercase;
            margin-bottom: .6rem;
            display: block;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            margin-bottom: 1.4rem;
        }

        .role-wrap {
            position: relative;
        }

        .role-wrap input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-tile {
            border: 1.5px solid var(--brd);
            border-radius: 13px;
            padding: 1.1rem .75rem;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 255, 255, .02);
            transition: all var(--ease);
            user-select: none;
        }

        .role-tile:hover {
            border-color: rgba(255, 106, 0, .35);
            background: rgba(139, 0, 0, .06);
        }

        .role-wrap input:checked~.role-tile {
            border-color: var(--secondary);
            background: rgba(139, 0, 0, .12);
            box-shadow: 0 0 0 3px rgba(139, 0, 0, .12), 0 4px 18px rgba(255, 106, 0, .15);
        }

        .role-tile i {
            display: block;
            font-size: 1.55rem;
            color: var(--tertiary);
            margin-bottom: .45rem;
        }

        .role-tile .rn {
            font-size: .88rem;
            font-weight: 700;
            color: var(--txt-1);
        }

        .role-tile .rd {
            font-size: .71rem;
            color: var(--txt-m);
            margin-top: .2rem;
        }

        .btn-main {
            width: 100%;
            padding: .82rem;
            background: var(--grad);
            border: none;
            border-radius: 11px;
            font-size: .95rem;
            font-weight: 700;
            font-family: inherit;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 22px rgba(139, 0, 0, .38);
            transition: transform var(--ease), box-shadow var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 30px rgba(255, 106, 0, .4);
        }

        .btn-main:active {
            transform: scale(.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: 1.5rem 0;
            color: var(--txt-m);
            font-size: .74rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--brd);
        }

        .auth-foot {
            text-align: center;
            font-size: .86rem;
            color: var(--txt-m);
        }

        .auth-foot a {
            color: var(--tertiary);
            font-weight: 600;
            text-decoration: none;
            transition: color var(--ease);
        }

        .auth-foot a:hover {
            color: var(--secondary);
        }

        footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 1rem;
            font-size: .72rem;
            color: var(--txt-m);
            border-top: 1px solid var(--brd);
        }

        @media (max-width: 480px) {
            nav {
                padding: .8rem 1rem;
            }

            .auth-card {
                padding: 1.75rem 1.25rem;
                border-radius: 18px;
            }

            .auth-heading {
                font-size: 1.35rem;
            }
        }

        @media (max-width: 360px) {
            .role-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a class="brand" href="/landing"><i class="fas fa-brain"></i> Wasla Master</a>
        <a class="nav-pill" href="/login"><i class="fas fa-sign-in-alt"></i> &nbsp;Sign In</a>
    </nav>
    <main>
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-brain"></i></div>
                <span class="auth-logo-text">Wasla Edu</span>
            </div>
            <h1 class="auth-heading">Create your account ✨</h1>
            <p class="auth-sub">Join Wasla for free and start your AI-powered learning journey today.</p>

            {% if error %}
            <div class="auth-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
            {% endif %}

            <form method="post" action="/register">
                <div class="form-group">
                    <label class="lbl" for="username">Username</label>
                    <div class="iw">
                        <i class="fas fa-user ico"></i>
                        <input type="text" id="username" name="username" placeholder="Pick a username (min 3 chars)"
                            required autofocus minlength="3" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label class="lbl" for="password">Password</label>
                    <div class="iw">
                        <i class="fas fa-lock ico"></i>
                        <input type="password" id="password" name="password"
                            placeholder="Create a password (min 6 chars)" required minlength="6"
                            autocomplete="new-password">
                    </div>
                </div>

                <span class="role-head">I am a…</span>
                <div class="role-grid">
                    <label class="role-wrap">
                        <input type="radio" name="role" value="user" checked>
                        <div class="role-tile">
                            <i class="fas fa-graduation-cap"></i>
                            <div class="rn">Learner</div>
                            <div class="rd">Student / Self-learner</div>
                        </div>
                    </label>
                    <label class="role-wrap">
                        <input type="radio" name="role" value="helper">
                        <div class="role-tile">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <div class="rn">Helper</div>
                            <div class="rd">Teacher / Tutor</div>
                        </div>
                    </label>
                </div>

                <button type="submit" class="btn-main"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>

            <div class="divider">OR</div>
            <div class="auth-foot">Already have an account? <a href="/login">Sign in →</a></div>
        </div>
    </main>
    <footer>© 2026 Wasla Edu — Crimson Hearth Theme</footer>
</body>

</html>
