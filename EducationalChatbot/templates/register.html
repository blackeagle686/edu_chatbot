<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Wasla Edu</title>
    <meta name="description" content="Create your free Wasla Edu account — AI-powered educational assistant.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --red: #8B0000;
            --red-h: #a80000;
            --orange: #FF6A00;
            --amber: #FFA94D;
            --bg: #121212;
            --bg-card: #1a1a1a;
            --bg-input: #222222;
            --border: rgba(255, 106, 0, .18);
            --border-h: rgba(255, 106, 0, .45);
            --txt-1: #F5F0EA;
            --txt-m: rgba(245, 235, 220, .5);
            --ease: 0.22s cubic-bezier(.4, 0, .2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--txt-1);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 70% 55% at 15% 10%, rgba(139, 0, 0, .22) 0%, transparent 65%),
                radial-gradient(ellipse 55% 45% at 88% 88%, rgba(255, 106, 0, .16) 0%, transparent 60%),
                radial-gradient(ellipse 45% 40% at 50% 50%, rgba(255, 169, 77, .06) 0%, transparent 55%);
        }

        /* ── Navbar ── */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: rgba(18, 18, 18, .8);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--orange), var(--amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: .55rem;
            text-decoration: none;
        }

        .brand i {
            -webkit-text-fill-color: initial;
            color: var(--orange);
            filter: drop-shadow(0 0 7px var(--orange));
        }

        .nav-link-ghost {
            font-size: .85rem;
            font-weight: 500;
            color: var(--txt-m);
            text-decoration: none;
            padding: .4rem .9rem;
            border: 1px solid var(--border);
            border-radius: 9px;
            transition: all var(--ease);
        }

        .nav-link-ghost:hover {
            color: var(--amber);
            border-color: var(--border-h);
            background: rgba(255, 106, 0, .07);
        }

        /* ── Main ── */
        main {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.25rem;
        }

        /* ── Auth Card ── */
        .auth-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 2.75rem 2.25rem;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, .03) inset,
                0 8px 48px rgba(0, 0, 0, .55),
                0 0 60px rgba(139, 0, 0, .12),
                0 0 100px rgba(255, 106, 0, .07);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: .7rem;
            margin-bottom: 2rem;
        }

        .auth-logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--red), var(--orange));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: #fff;
            box-shadow: 0 4px 18px rgba(139, 0, 0, .35);
        }

        .auth-logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--orange), var(--amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--txt-1);
            margin-bottom: .35rem;
        }

        .auth-sub {
            font-size: .85rem;
            color: var(--txt-m);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .auth-error {
            background: rgba(139, 0, 0, .15);
            border: 1px solid rgba(139, 0, 0, .35);
            color: #ffaaaa;
            border-radius: 10px;
            font-size: .84rem;
            padding: .65rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label.field-label {
            display: block;
            font-size: .78rem;
            font-weight: 600;
            color: var(--txt-m);
            letter-spacing: .04em;
            margin-bottom: .5rem;
            text-transform: uppercase;
        }

        .field-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--txt-m);
            font-size: .88rem;
            pointer-events: none;
            transition: color var(--ease);
        }

        .field-wrap:focus-within .field-icon {
            color: var(--orange);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .78rem 1rem .78rem 2.6rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--txt-1);
            font-size: .92rem;
            font-family: inherit;
            outline: none;
            transition: border-color var(--ease), box-shadow var(--ease);
        }

        input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255, 106, 0, .14);
        }

        input::placeholder {
            color: rgba(245, 235, 220, .25);
        }

        /* ── Role picker ── */
        .role-label-head {
            font-size: .78rem;
            font-weight: 600;
            color: var(--txt-m);
            letter-spacing: .04em;
            text-transform: uppercase;
            margin-bottom: .65rem;
            display: block;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            margin-bottom: 1.5rem;
        }

        .role-option {
            display: none;
        }

        .role-card {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.1rem .75rem;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 255, 255, .025);
            transition: all var(--ease);
        }

        .role-card:hover {
            border-color: var(--border-h);
            background: rgba(255, 106, 0, .06);
        }

        .role-option:checked+.role-card {
            border-color: var(--orange);
            background: rgba(255, 106, 0, .12);
            box-shadow: 0 0 0 3px rgba(255, 106, 0, .12), 0 4px 16px rgba(255, 106, 0, .15);
        }

        .role-card i {
            display: block;
            font-size: 1.55rem;
            color: var(--amber);
            margin-bottom: .45rem;
        }

        /* for accessible :has fallback */
        .role-wrap {
            position: relative;
        }

        .role-wrap input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-wrap input:checked~.role-card {
            border-color: var(--orange);
            background: rgba(255, 106, 0, .12);
            box-shadow: 0 0 0 3px rgba(255, 106, 0, .12);
        }

        .role-name {
            font-size: .88rem;
            font-weight: 700;
            color: var(--txt-1);
        }

        .role-desc {
            font-size: .72rem;
            color: var(--txt-m);
            margin-top: .2rem;
        }

        /* ── Submit ── */
        .btn-submit {
            width: 100%;
            padding: .82rem;
            background: linear-gradient(135deg, var(--red), var(--orange));
            border: none;
            border-radius: 12px;
            font-size: .95rem;
            font-weight: 700;
            font-family: inherit;
            color: #fff;
            cursor: pointer;
            letter-spacing: .01em;
            box-shadow: 0 4px 20px rgba(139, 0, 0, .35);
            transition: transform var(--ease), box-shadow var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 28px rgba(255, 106, 0, .4);
        }

        .btn-submit:active {
            transform: scale(.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: 1.5rem 0;
            color: var(--txt-m);
            font-size: .76rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-footer {
            text-align: center;
            font-size: .86rem;
            color: var(--txt-m);
        }

        .auth-footer a {
            color: var(--amber);
            font-weight: 600;
            text-decoration: none;
            transition: color var(--ease);
        }

        .auth-footer a:hover {
            color: var(--orange);
        }

        footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 1.1rem;
            font-size: .72rem;
            color: var(--txt-m);
            border-top: 1px solid var(--border);
        }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            nav {
                padding: .8rem 1rem;
            }

            .auth-card {
                padding: 2rem 1.25rem;
                border-radius: 18px;
            }

            .auth-title {
                font-size: 1.4rem;
            }

            .role-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 360px) {
            .role-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a class="brand" href="/landing">
            <i class="fas fa-brain"></i> Wasla Master
        </a>
        <a class="nav-link-ghost" href="/login"><i class="fas fa-sign-in-alt"></i> &nbsp;Sign In</a>
    </nav>

    <main>
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-brain"></i></div>
                <span class="auth-logo-text">Wasla Edu</span>
            </div>

            <h1 class="auth-title">Create your account ✨</h1>
            <p class="auth-sub">Join Wasla and start your AI-powered learning journey — it's completely free.</p>

            {% if error %}
            <div class="auth-error">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/register">
                <div class="form-group">
                    <label class="field-label" for="username">Username</label>
                    <div class="field-wrap">
                        <i class="fas fa-user field-icon"></i>
                        <input type="text" id="username" name="username" placeholder="Pick a username (min 3 chars)"
                            required autofocus minlength="3" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label class="field-label" for="password">Password</label>
                    <div class="field-wrap">
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" id="password" name="password"
                            placeholder="Create a password (min 6 chars)" required minlength="6"
                            autocomplete="new-password">
                    </div>
                </div>

                <span class="role-label-head">I am a…</span>
                <div class="role-grid">
                    <label class="role-wrap">
                        <input type="radio" name="role" value="user" checked>
                        <div class="role-card">
                            <i class="fas fa-graduation-cap"></i>
                            <div class="role-name">Learner</div>
                            <div class="role-desc">Student / Self-learner</div>
                        </div>
                    </label>
                    <label class="role-wrap">
                        <input type="radio" name="role" value="helper">
                        <div class="role-card">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <div class="role-name">Helper</div>
                            <div class="role-desc">Teacher / Tutor</div>
                        </div>
                    </label>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="divider">OR</div>
            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in →</a>
            </div>
        </div>
    </main>

    <footer>© 2026 Wasla Edu — AI-Powered Learning</footer>

    <script>
        /* Make role cards visually toggle on click since we use hidden radios */
        document.querySelectorAll('.role-wrap input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.querySelectorAll('.role-wrap input').forEach(r => r.closest('.role-wrap').querySelector('.role-card').style.cssText = '');
            });
        });
    </script>
</body>

</html>
