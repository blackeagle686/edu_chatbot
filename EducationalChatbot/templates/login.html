<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Wasla Edu</title>
    <meta name="description" content="Sign in to Wasla Edu — AI-powered educational assistant.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">

    <script src="/static/fouc.js"></script>
</head>

<body class="fixed-layout">
    <nav class="navbar">
        <a class="navbar-brand" href="/landing"><i class="fas fa-brain"></i> Wasla Master</a>
        <div style="display:flex; gap:1rem; align-items:center;">
            <button id="themeToggleBtn" title="Toggle Theme"
                style="border:none; cursor:pointer; background:transparent; font-size:1.1rem; color:var(--txt-m); transition:color 0.2s;"
                onmouseover="this.style.color='var(--secondary)'" onmouseout="this.style.color='var(--txt-m)'">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <a class="nav-pill" href="/register"><i class="fas fa-user-plus"></i> &nbsp;Sign Up Free</a>
        </div>
    </nav>
    <main class="auth-main">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-brain"></i></div>
                <span class="auth-logo-text">Wasla Edu</span>
            </div>
            <h1 class="auth-heading">Welcome back 👋</h1>
            <p class="auth-sub">Sign in to continue your learning journey with Wasla.</p>

            {% if error %}
            <div class="auth-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-group">
                    <label class="lbl" for="username">Username</label>
                    <div class="iw">
                        <i class="fas fa-user ico"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required
                            autofocus autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label class="lbl" for="password">Password</label>
                    <div class="iw">
                        <i class="fas fa-lock ico"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required
                            autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-main"><i class="fas fa-sign-in-alt"></i> Sign In</button>
            </form>

            <div class="divider">OR</div>
            <div class="auth-foot">Don't have an account? <a href="/register">Create one free →</a></div>
        </div>
    </main>
    <footer>© 2026 Wasla Edu — Crimson Hearth Theme</footer>

    <script src="/static/main.js"></script>
</body>

</html>
